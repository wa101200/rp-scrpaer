
[tasks.up]
run = "docker compose -f ../../docker-compose.yaml up -d"
description = "Start the Kestra stack"

[tasks.down]
run = "docker compose -f ../../docker-compose.yaml down"
description = "Stop the Kestra stack"

[tasks.logs]
run = "docker compose -f ../../docker-compose.yaml logs -f kestra"
description = "Tail Kestra container logs"
