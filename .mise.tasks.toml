[tasks.pre-commit]
run = "hk pre-commit -a"

[tasks.format]
run = "hk fix -a"

[tasks.lint]
run = "hk check -a"

[prepare.uv]
run = "uv sync --all-packages"

[tasks.all-ci]
description = "Will simulate CI environment by running all checks and tests"
run = [
  { task = "//...:generate-libs*" },
  { task = "//:format" },
  { tasks = [
    "//:lint",
    "//...:build",
    "//...:test",
  ] },
]

[tasks.test]
run = "echo no tests defined"

[tasks.registry-login]
description = "Log in to Docker registry"
env = { REGISTRY_PASSWORD = { required = true }, REGISTRY_URL = { required = true }, REGISTRY_USERNAME = { required = true } }
run = 'echo "${REGISTRY_PASSWORD}" | docker login "${REGISTRY_URL}" -u "${REGISTRY_USERNAME}" --password-stdin'

[task_templates.build]
description = "Build the Docker image locally"
env = { '_'.source = { path = "scripts/ci/github-token.env.sh" } }
usage = 'arg "[tag]" default="local" help="Image tag to use"'
run = "docker buildx build --secret id=GITHUB_TOKEN,env=GITHUB_TOKEN -f Dockerfile -t $IMAGE_NAME:${usage_tag} ../.."

[task_templates.push]
description = "Build and push multi-platform Docker image to registry"
env = { '_'.source = { path = "scripts/ci/github-token.env.sh" } }
usage = 'arg "<tag>" var=#true var_min=1 help="Image tags to push"'
run = """
FULL_IMAGE="${REGISTRY_URL}/${REGISTRY_USERNAME}/${IMAGE_NAME}"
TAG_ARGS=""
for tag in ${usage_tag}; do
  TAG_ARGS="$TAG_ARGS -t ${FULL_IMAGE}:${tag}"
done
docker buildx build \
  --platform linux/amd64,linux/arm64 \
  --push \
  --secret id=GITHUB_TOKEN,env=GITHUB_TOKEN \
  -f Dockerfile \
  $TAG_ARGS \
  ../..
"""
depends = ["//:registry-login"]

[task_templates.build-push]
description = "Build and push Docker image to registry with git-derived tags"
env = { '_'.source = { path = "scripts/ci/git-current.sh" } }
usage = 'arg "[tag]" var=#true help="Image tags to push"'
run = """
TAGS="${usage_tag:-"$GIT_SHA_SHORT-dev $GIT_BRANCH_NORM"}"
mise run push $TAGS

FULL_IMAGE="${REGISTRY_URL}/${REGISTRY_USERNAME}/${IMAGE_NAME}"
FIRST_TAG=$(echo $TAGS | awk '{print $1}')
IMAGE_SHA=$(docker buildx imagetools inspect "${FULL_IMAGE}:${FIRST_TAG}" 2>/dev/null | grep -m1 'Digest:' | awk '{print $2}')
echo "IMAGE_NAME=$FULL_IMAGE"
echo "IMAGE_TAG=$FIRST_TAG"
echo "IMAGE_SHA=$IMAGE_SHA"
"""
