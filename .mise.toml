experimental_monorepo_root = true

[env]
'_'.file = { path = ".env" }
DOCKER_BUILDKIT = 1
RP_AUTH_TOKEN = ""
MONOREPO_ROOT = "{{config_root}}"
[monorepo]
config_roots = ["packages/*", "scripts/*"]

[settings]
experimental = true
auto_install = true

[tools]
python = "3.12"
uv = "0.10.7"
hk = "1.36.0"
ruff = "latest"
pkl = "latest"
taplo = "latest"
yamlfmt = "latest"
pinact = "latest"
zizmor = "latest"
github-cli = "latest"
hadolint = "latest"
watchexec = "latest"
"npm:@quobix/vacuum" = "latest"
"npm:@biomejs/biome" = "latest"

[tasks.pre-commit]
run = "hk pre-commit -a"

[tasks.format]
run = "hk fix -a"

[tasks.lint]
run = "hk check -a"

[prepare.uv]
run = "uv sync --all-packages"

[tasks.all-ci]
description = "Will simulate CI environment by running all checks and tests"
run = [
  { task = "//...:generate-libs*" },
  { task = "//:format" },
  { tasks = [
    "//:lint",
    "//...:build",
    "//...:test",
  ] },
]


[tasks.test]
run = "echo no tests defined"

[tasks."kestra:up"]
description = "Start Kestra orchestrator with PostgreSQL backend"
run = "docker-compose -f docker-compose.kestra.yml up -d"

[tasks."kestra:down"]
description = "Stop Kestra orchestrator"
run = "docker-compose -f docker-compose.kestra.yml down"

[tasks."kestra:logs"]
description = "View Kestra logs"
run = "docker-compose -f docker-compose.kestra.yml logs -f kestra"

[tasks."kestra:restart"]
description = "Restart Kestra orchestrator"
run = "docker-compose -f docker-compose.kestra.yml restart kestra"

[tasks."kestra:reset"]
description = "Reset Kestra (remove all data and containers)"
run = "docker-compose -f docker-compose.kestra.yml down -v"

[tasks."kestra:open"]
description = "Open Kestra UI in browser"
run = """
if command -v xdg-open > /dev/null; then
  xdg-open http://localhost:8080
elif command -v open > /dev/null; then
  open http://localhost:8080
else
  echo "Kestra UI is available at http://localhost:8080"
fi
"""

